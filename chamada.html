<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Faça a chamada da turma de forma rápida e digital com o Clivon Edu.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clivon Edu — Fazer Chamada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="/assets/img/icon.svg" type="image/png">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
  <link rel="preconnect" href="https://unpkg.com">
  <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #2D5BE3;
      --blue-light: #2563EB;
      --green:      #22C55E;
      --red:        #EF4444;
      --amber:      #F59E0B;
      --bg:         #F0F2F7;
      --surface:    #FFFFFF;
      --border:     #E5E7EB;
      --text-1:     #111827;
      --text-2:     #6B7280;
      --text-3:     #9CA3AF;
      --nav-h:      52px;
    }

    html { font-size: 14px; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    .nav {
      height: var(--nav-h);
      background: var(--blue);
      display: flex; align-items: center; padding: 0 28px;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: #fff; line-height: 1;
    }
    .nav-logo-mark {
      display: flex; align-items: center; gap: 5px;
      font-size: 15px; font-weight: 700; letter-spacing: -.3px;
    }
    .nav-logo-mark svg { flex-shrink: 0; }
    .nav-spacer { flex: 1; }

    .nav-user {
      display: flex; align-items: center; gap: 10px;
      padding: 5px 8px; border-radius: 8px;
    }
    .nav-avatar {
      width: 32px; height: 32px; border-radius: 7px;
      background: rgba(255,255,255,.25); overflow: hidden;
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 700; color: #fff;
    }
    .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .nav-user-info { line-height: 1.3; }
    .nav-user-name  { font-size: 13px; font-weight: 600; color: #fff; }
    .nav-user-email { font-size: 11px; color: rgba(255,255,255,.65); }

    /* ── PAGE ── */
    .page-wrap { max-width: 900px; margin: 0 auto; padding: 40px 28px 60px; }
    
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-2); font-weight: 600; font-size: 13px;
      text-decoration: none; margin-bottom: 20px; transition: color .15s;
    }
    .btn-back:hover { color: var(--blue); }

    .page-header { margin-bottom: 24px; }
    .page-header h1 {
      font-size: 28px; font-weight: 800; color: var(--text-1);
      letter-spacing: -.5px; margin-bottom: 6px;
      display: flex; align-items: center; gap: 10px;
    }
    .page-header h1 i { color: var(--blue); }
    .page-header p { font-size: 14px; color: var(--text-2); }

    /* ── FILTERS CARD ── */
    .filters-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; margin-bottom: 24px;
      display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap;
    }
    .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; }
    .field input, .field select {
      height: 42px; padding: 0 14px; border: 1px solid var(--border);
      border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px;
      color: var(--text-1); background: var(--bg); transition: all .15s;
      outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px rgba(45,91,227,0.1); }
    
    .btn-carregar {
      height: 42px; padding: 0 24px; background: var(--text-1); color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-carregar:hover { background: #1f2937; }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface); border-radius: 12px;
      border: 1px solid var(--border); overflow: hidden;
      display: none; /* Só mostra após buscar a turma */
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border); background: #F9FAFB; }
    th { padding: 14px 20px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-2); }
    td { padding: 14px 20px; font-size: 14px; color: var(--text-1); border-bottom: 1px solid #F3F4F6; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #FAFAFA; }
    
    .aluno-nome { font-weight: 600; }
    .aluno-mat { font-size: 12px; color: var(--text-3); margin-top: 2px; }

    /* ── STATUS PILLS (Falta/Presença) ── */
    .status-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .status-btn {
      padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
      border: 1px solid var(--border); background: #fff; color: var(--text-2);
      cursor: pointer; transition: all .15s; user-select: none;
    }
    .status-btn:hover { background: var(--bg); }
    
    /* Ativos */
    .status-btn[data-status="present"].active { background: #DCFCE7; color: #16A34A; border-color: #16A34A; }
    .status-btn[data-status="absent"].active { background: #FEE2E2; color: #DC2626; border-color: #DC2626; }
    .status-btn[data-status="justified"].active { background: #F3F4F6; color: #4B5563; border-color: #6B7280; }

    /* Observações */
    .obs-input {
      width: 100%; height: 38px; padding: 0 12px; border: 1px solid transparent;
      border-radius: 6px; font-size: 13px; font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text-1); transition: all .15s;
    }
    .obs-input:focus { border-color: var(--blue); background: #fff; outline: none; }
    .obs-input::placeholder { color: var(--text-3); }

    /* ── ACTIONS ── */
    .actions-bar {
      padding: 20px; border-top: 1px solid var(--border);
      background: #F9FAFB; display: flex; justify-content: flex-end;
    }
    .btn-salvar {
      height: 44px; padding: 0 28px; background: var(--blue); color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      transition: all .15s; box-shadow: 0 4px 12px rgba(45,91,227,0.2);
    }
    .btn-salvar:hover { background: #2449c0; transform: translateY(-1px); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #111827; color: #fff; padding: 12px 24px;
      border-radius: 8px; font-size: 14px; font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0; pointer-events: none; z-index: 9999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.err  { background: var(--red); }
    .toast.ok   { background: #16a34a; }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="dashboard.html">
    <div class="nav-logo-mark"><img src="/assets/img/logo.svg" fetchpriority="high" alt="logo-clivon"></div>
  </a>
  <div class="nav-spacer"></div>
  <div class="nav-user">
    <div class="nav-avatar" id="navAvatar">P</div>
    <div class="nav-user-info">
      <div class="nav-user-name" id="navName">Professor</div>
      <div class="nav-user-email" id="navEmail">escola@edu.br</div>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <a href="dashboard.html" class="btn-back"><i class="ph ph-arrow-left"></i> Voltar para o Painel</a>
  
  <div class="page-header">
    <h1><i class="ph ph-users"></i> Chamada — <span id="subjectTitle">Disciplina</span></h1>
    <p>Selecione a turma e a data para fazer o registro de presença.</p>
  </div>

  <div class="filters-card">
    <div class="field">
      <label for="classSelect">Turma</label>
      <select id="classSelect">
        <option value="" disabled selected>Carregando turmas...</option>
      </select>
    </div>
    <div class="field">
      <label for="dateSelect">Data da Aula</label>
      <input type="date" id="dateSelect">
    </div>
    <button class="btn-carregar" onclick="carregarAlunos()">Buscar Alunos</button>
  </div>

  <div class="table-wrap" id="tableWrap">
    <table>
      <thead>
        <tr>
          <th width="35%">Aluno</th>
          <th width="40%">Situação</th>
          <th width="25%">Observações (Opcional)</th>
        </tr>
      </thead>
      <tbody id="alunosBody">
        </tbody>
    </table>
    <div class="actions-bar">
      <button class="btn-salvar" id="btnSalvar" onclick="salvarChamada()">
        <i class="ph ph-floppy-disk"></i> Registrar Chamada
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script>
  let currentSubject = sessionStorage.getItem("currentSubject") || "";
  let alunosAtual = [];

  window.addEventListener("DOMContentLoaded", async () => {
    if (!CONFIG.getToken()) window.location.href = "login.html";
    if (!currentSubject) {
      alert("Nenhuma disciplina selecionada.");
      window.location.href = "dashboard.html";
    }

    // Atualiza UI
    document.getElementById("subjectTitle").textContent = currentSubject;
    document.getElementById("navName").textContent = localStorage.getItem("clivon_user") || "Professor";
    document.getElementById("navEmail").textContent = localStorage.getItem("clivon_email") || "";
    
    const foto = localStorage.getItem(`clivon_avatar_${localStorage.getItem("clivon_email")}`);
    if (foto) document.getElementById("navAvatar").innerHTML = `<img src="${foto}">`;

    // Define a data de hoje como padrão no input
    document.getElementById("dateSelect").valueAsDate = new Date();

    // Carrega turmas dinamicamente
    await carregarTurmas();
  });

  async function carregarTurmas() {
    const sel = document.getElementById("classSelect");
    try {
      const res = await CONFIG.apiFetch("/professor/turmas");
      if (!res.ok) throw new Error();
      const turmas = await res.json();

      sel.innerHTML = '<option value="" disabled selected>Selecione a turma...</option>';
      turmas.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t.id;
        opt.textContent = t.name;
        sel.appendChild(opt);
      });
    } catch {
      sel.innerHTML = '<option value="" disabled selected>Erro ao carregar turmas</option>';
      toast("Não foi possível carregar as turmas.", "err");
    }
  }

  async function carregarAlunos() {
    const classId = document.getElementById("classSelect").value;
    if (!classId) return toast("Selecione uma turma primeiro.", "err");

    toast("Buscando alunos...");
    document.getElementById("tableWrap").style.display = "none";
    
    try {
      const res = await CONFIG.apiFetch(`/professor/turmas/${classId}/alunos`);
      if (!res.ok) throw new Error("Falha ao buscar turma");
      
      alunosAtual = await res.json();
      
      if(alunosAtual.length === 0) {
        toast("Nenhum aluno encontrado nesta turma.", "err");
        return;
      }

      renderizarTabela();
      document.getElementById("tableWrap").style.display = "block";
      toast("Lista carregada com sucesso!", "ok");

    } catch (err) {
      toast("Erro ao carregar os alunos. Servidor offline?", "err");
    }
  }

  function renderizarTabela() {
    const tbody = document.getElementById("alunosBody");
    
    tbody.innerHTML = alunosAtual.map(a => `
      <tr data-student-id="${a.id}">
        <td>
          <div class="aluno-nome">${a.name}</div>
          <div class="aluno-mat">Matrícula: ${a.enrollment}</div>
        </td>
        <td>
          <div class="status-group">
            <button class="status-btn active" data-status="present" onclick="setStatus(this, ${a.id}, 'present')">Presente</button>
            <button class="status-btn" data-status="absent" onclick="setStatus(this, ${a.id}, 'absent')">Falta</button>
            <button class="status-btn" data-status="justified" onclick="setStatus(this, ${a.id}, 'justified')">Justificada</button>
          </div>
        </td>
        <td>
          <input type="text" class="obs-input" placeholder="Ex: Saiu mais cedo..." id="obs_${a.id}">
        </td>
      </tr>
    `).join("");

    // O status padrão (presente) já é injetado no objeto local
    alunosAtual.forEach(a => a.status = 'present');
  }

  function setStatus(btnElement, studentId, novoStatus) {
    // Atualiza o objeto de dados
    const aluno = alunosAtual.find(a => a.id === studentId);
    if(aluno) aluno.status = novoStatus;

    // Atualiza as cores dos botões na linha clicada
    const group = btnElement.parentElement;
    group.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');
  }

  async function salvarChamada() {
    const btn = document.getElementById("btnSalvar");
    const classId = document.getElementById("classSelect").value;
    const lessonDate = document.getElementById("dateSelect").value;

    if (!classId || !lessonDate) return toast("Turma e data são obrigatórios.", "err");

    // Monta o payload conforme esperado pelo Pydantic no FastAPI
    const payload = {
      class_id: parseInt(classId),
      subject: currentSubject,
      lesson_date: lessonDate,
      alunos: alunosAtual.map(a => ({
        student_id: a.id,
        status: a.status,
        note: document.getElementById(`obs_${a.id}`).value.trim()
      }))
    };

    btn.disabled = true;
    btn.innerHTML = "Salvando...";

    try {
      const res = await CONFIG.apiFetch("/professor/chamada", {
        method: "POST",
        body: JSON.stringify(payload)
      });

      if (!res.ok) throw new Error("Erro ao salvar.");
      
      toast("Chamada registrada com sucesso!", "ok");
      setTimeout(() => window.location.href = "dashboard.html", 1500);

    } catch (err) {
      toast("Erro ao registrar chamada.", "err");
      btn.disabled = false;
      btn.innerHTML = `<i class="ph ph-floppy-disk"></i> Registrar Chamada`;
    }
  }

  function toast(msg, type="") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show" + (type ? " "+type : "");
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove("show"), 2800);
  }
</script>
</body>
</html>
